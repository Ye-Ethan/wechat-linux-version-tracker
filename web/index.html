<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeChat for Linux · 版本追踪</title>
  <meta name="description" content="每日自动追踪 Linux 版微信客户端的最新版本号" />
  <style>
    :root {
      --green: #07c160;
      --green-dark: #06ad56;
      --bg: #f2f4f7;
      --card: #ffffff;
      --text: #1f2329;
      --muted: #8a9099;
      --border: #ebedf0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --card: #161b22;
        --text: #e6edf3;
        --muted: #8b949e;
        --border: #30363d;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 440px;
      padding: 40px 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--green);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo svg { width: 38px; height: 38px; fill: #fff; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .version-label { color: var(--muted); font-size: 13px; letter-spacing: .05em; text-transform: uppercase; }
    .version {
      font-size: 48px;
      font-weight: 700;
      color: var(--green);
      margin: 6px 0 4px;
      font-variant-numeric: tabular-nums;
      word-break: break-all;
    }
    .updated { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .actions { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      display: block;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity .2s, background .2s;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text); }
    footer { margin-top: 28px; font-size: 12px; color: var(--muted); }
    footer a { color: var(--muted); }
    .loading { color: var(--muted); font-size: 32px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 5.94 2 10.8c0 2.77 1.46 5.24 3.75 6.86L5 21l3.2-1.62c1.18.33 2.44.51 3.8.51 5.52 0 10-3.94 10-8.79C22 5.94 17.52 2 12 2zm-3.2 7.4a1.2 1.2 0 110-2.4 1.2 1.2 0 010 2.4zm6.4 0a1.2 1.2 0 110-2.4 1.2 1.2 0 010 2.4z"/></svg>
    </div>
    <h1>Linux 版微信 · 版本追踪</h1>
    <p class="subtitle">每日自动探测官方安装包的最新版本号</p>

    <p class="version-label">当前版本</p>
    <p class="version" id="version"><span class="loading">···</span></p>
    <p class="updated" id="updated">加载中…</p>

    <div class="actions">
      <a class="btn btn-primary" href="https://linux.weixin.qq.com/">前往微信 Linux版 官方下载页</a>
      <a class="btn btn-secondary" id="jsonLink" href="./latest.json">查看 latest.json</a>
    </div>

    <footer>
      数据来源：微信官方 CDN · 由 GitHub Actions 每日自动更新<br />
      <a id="repoLink" href="https://github.com/Ye-Ethan/wechat-linux-version-tracker">GitHub 仓库</a>
    </footer>
  </main>

  <script>
    function fmt(iso) {
      if (!iso) return "未知时间";
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ` +
             `${pad(d.getHours())}:${pad(d.getMinutes())} (本地时间)`;
    }
    fetch("./latest.json?t=" + Date.now())
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then((data) => {
        document.getElementById("version").textContent = data.currentVersion || "未知";
        document.getElementById("updated").textContent = "更新于 " + fmt(data.updateTime);
        document.title = `微信 Linux ${data.currentVersion || ""} · 版本追踪`;
      })
      .catch(() => {
        document.getElementById("version").textContent = "—";
        document.getElementById("updated").textContent = "暂无数据，请稍后再试";
      });
  </script>
</body>
</html>
